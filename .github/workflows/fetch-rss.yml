name: Fetch YouTube RSS Feeds

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch all RSS feeds
        run: python3 scripts/fetch_rss.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feeds.json
          git diff --staged --quiet || git commit -m "chore: update feeds $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
